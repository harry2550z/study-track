<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --yt-red: #ff0033;
    --yt-gradient: linear-gradient(45deg, #ff0033, #ff00aa);
    --primary-light: #2a0a10;
    --surface: #212121;
    --surface2: #272727;
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --border: #3f3f3f;
    --text: #f1f1f1;
    --text2: #aaaaaa;
    --text3: #717171;
    --radius: 12px;
    --radius-sm: 8px;
    --transition: all 0.2s cubic-bezier(.4,0,.2,1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Roboto', sans-serif;
    min-height: 100vh; -webkit-font-smoothing: antialiased;
  }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* LOADING */
  #loading {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 999; flex-direction: column; gap: 20px;
  }
  .loader-ring {
    width: 44px; height: 44px; border-radius: 50%;
    border: 3px solid var(--border); border-top-color: var(--yt-red);
    animation: spin 0.8s linear infinite;
  }
  .loader-text { font-size: 13px; color: var(--text3); font-weight: 500; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* LOGIN */
  #login-screen {
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center; padding: 24px;
    background: radial-gradient(ellipse at 30% 20%, #2a0a0a 0%, #0f0f0f 60%);
  }
  .login-card {
    background: var(--surface); border-radius: 20px;
    padding: 44px 36px; width: 100%; max-width: 360px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.7); border: 1px solid var(--border);
  }
  .login-logo {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; margin-bottom: 8px;
  }
  .login-logo-icon {
    background: var(--yt-gradient); border-radius: 10px;
    width: 42px; height: 42px; display: flex; align-items: center;
    justify-content: center; font-size: 20px;
    box-shadow: 0 4px 14px rgba(255,0,51,0.4);
  }
  .login-logo-text { font-size: 22px; font-weight: 700; color: var(--text); }
  .login-sub { font-size: 13px; color: var(--text3); text-align: center; margin-bottom: 32px; line-height: 1.6; margin-top: 8px; }
  .field-wrap { margin-bottom: 14px; }
  .field-label { display: block; font-size: 11px; font-weight: 600; color: var(--text3); margin-bottom: 7px; letter-spacing: 0.6px; text-transform: uppercase; }
  .field-input {
    width: 100%; background: var(--bg2); border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: 'Roboto', sans-serif; font-size: 15px;
    padding: 13px 16px; outline: none; transition: var(--transition);
  }
  .field-input::placeholder { color: var(--text3); }
  .field-input:focus { border-color: var(--yt-red); box-shadow: 0 0 0 3px rgba(255,0,51,0.15); background: #1f1f1f; }
  .field-input.pin { letter-spacing: 16px; font-size: 22px; text-align: center; font-family: 'Roboto Mono', monospace; }
  .login-btn {
    width: 100%; background: var(--yt-gradient); color: #fff; border: none; cursor: pointer;
    border-radius: 24px; font-family: 'Roboto', sans-serif;
    font-size: 15px; font-weight: 600; padding: 14px; margin-top: 8px;
    transition: var(--transition); box-shadow: 0 4px 14px rgba(255,0,51,0.4);
  }
  .login-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .login-btn:active { transform: scale(0.98); }
  .login-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
  .login-error { font-size: 12px; color: #ff4444; text-align: center; margin-top: 12px; min-height: 18px; font-weight: 500; }
  .login-note { font-size: 12px; color: var(--text3); text-align: center; margin-top: 20px; line-height: 1.7; }

  /* APP BAR */
  .app-bar {
    background: var(--bg); border-bottom: 1px solid var(--border);
    padding: 0 16px; display: flex; align-items: center;
    height: 56px; gap: 10px; position: sticky; top: 0; z-index: 10;
  }
  .app-bar-brand { display: flex; align-items: center; gap: 8px; flex: 1; }
  .app-bar-logo {
    background: var(--yt-gradient); border-radius: 7px;
    width: 30px; height: 30px; display: flex; align-items: center;
    justify-content: center; font-size: 15px; flex-shrink: 0;
  }
  .app-bar-title { font-size: 16px; font-weight: 700; color: var(--text); }
  .sync-chip {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 11px; border-radius: 20px;
    background: var(--surface2); font-size: 11px;
    color: var(--text2); font-weight: 500; border: 1px solid var(--border);
  }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #4caf82; flex-shrink: 0; }
  .sync-dot.syncing { background: #ffb74d; animation: blink 0.8s infinite; }
  .sync-dot.error { background: #ff4444; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .user-chip {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface2); border-radius: 20px;
    padding: 5px 12px 5px 5px; cursor: pointer;
    border: 1px solid var(--border); font-family: 'Roboto', sans-serif;
    transition: var(--transition);
  }
  .user-chip:hover { background: #333; border-color: #555; }
  .user-avatar {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--yt-gradient); display: flex; align-items: center;
    justify-content: center; font-size: 11px; font-weight: 700; color: #fff;
  }
  .user-name { font-size: 13px; font-weight: 500; color: var(--text2); }

  /* MAIN */
  #main-screen { display: none; }
  .content { max-width: 560px; margin: 0 auto; padding: 20px 16px 80px; }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-card {
    background: var(--surface); border-radius: var(--radius);
    padding: 16px 14px; border: 1px solid var(--border); transition: var(--transition);
  }
  .stat-card:hover { border-color: #555; background: var(--surface2); }
  .stat-label { font-size: 11px; color: var(--text3); font-weight: 500; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.4px; }
  .stat-value {
    font-size: 15px; font-weight: 700; font-family: 'Roboto Mono', monospace;
    background: var(--yt-gradient); -webkit-background-clip: text;
    -webkit-text-fill-color: transparent; background-clip: text;
    letter-spacing: -0.5px;
  }

  /* NAV */
  .nav-tabs {
    background: var(--surface); border-radius: 24px;
    padding: 4px; display: flex; gap: 2px; margin-bottom: 20px;
    border: 1px solid var(--border);
  }
  .tab-btn {
    flex: 1; background: none; border: none; cursor: pointer;
    font-family: 'Roboto', sans-serif; font-size: 13px; font-weight: 500;
    padding: 10px 8px; border-radius: 20px; color: var(--text3);
    transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .tab-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
  .tab-btn.active { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .tab-btn:hover:not(.active) { color: var(--text2); background: rgba(255,255,255,0.05); }

  /* VIEWS */
  .view { display: none; }
  .view.active { display: block; }

  /* SUBJECTS */
  .section-title { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.6px; margin-bottom: 12px; text-transform: uppercase; }
  .subject-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .subj-chip {
    display: flex; align-items: center; gap: 7px;
    padding: 8px 16px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--surface2);
    cursor: pointer; font-family: 'Roboto', sans-serif;
    font-size: 13px; font-weight: 500; color: var(--text3);
    transition: var(--transition);
  }
  .subj-chip:hover { border-color: #666; color: var(--text); }
  .subj-chip .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .subj-chip.selected { color: #fff; border-color: transparent; box-shadow: 0 2px 12px rgba(0,0,0,0.5); }

  /* TIMER */
  .timer-card {
    background: var(--surface); border-radius: 20px;
    padding: 44px 24px; text-align: center;
    border: 1px solid var(--border); margin-bottom: 20px;
  }
  .timer-display {
    font-family: 'Roboto Mono', monospace; font-size: 58px;
    font-weight: 300; color: var(--text); letter-spacing: -2px;
    line-height: 1; margin-bottom: 8px; transition: all 0.4s;
  }
  .timer-display.running {
    background: var(--yt-gradient); -webkit-background-clip: text;
    -webkit-text-fill-color: transparent; background-clip: text;
  }
  .active-label { font-size: 13px; color: var(--text3); margin-bottom: 32px; min-height: 20px; font-weight: 500; }
  .active-label span { font-weight: 600; color: var(--text2); }
  .fab {
    width: 68px; height: 68px; border-radius: 50%; border: none; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: var(--transition);
  }
  .fab svg { width: 32px; height: 32px; }
  .fab.start { background: var(--yt-gradient); color: #fff; box-shadow: 0 4px 18px rgba(255,0,51,0.45); }
  .fab.start:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(255,0,51,0.55); }
  .fab.stop { background: #272727; color: #ff4444; border: 2px solid #ff4444; }
  .fab.stop:hover { background: #3a1a1a; transform: scale(1.06); }
  .fab:active { transform: scale(0.96) !important; }

  /* BLOCKS */
  .blocks-card {
    background: var(--surface); border-radius: var(--radius);
    overflow: hidden; border: 1px solid var(--border); margin-bottom: 16px;
  }
  .blocks-header {
    padding: 14px 18px; display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .blocks-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .blocks-total {
    font-family: 'Roboto Mono', monospace; font-size: 13px; font-weight: 600;
    background: var(--yt-gradient); -webkit-background-clip: text;
    -webkit-text-fill-color: transparent; background-clip: text;
  }
  .block-item {
    padding: 13px 18px; display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.15s;
  }
  .block-item:last-child { border-bottom: none; }
  .block-item:hover { background: rgba(255,255,255,0.04); }
  .block-color { width: 3px; height: 36px; border-radius: 2px; flex-shrink: 0; }
  .block-info { flex: 1; }
  .block-subj { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
  .block-time { font-size: 11px; color: var(--text3); }
  .block-dur { font-family: 'Roboto Mono', monospace; font-size: 14px; font-weight: 600; color: var(--text2); }
  .icon-btn {
    background: none; border: none; cursor: pointer;
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--text3); transition: var(--transition);
  }
  .icon-btn:hover { background: rgba(255,68,68,0.15); color: #ff4444; }
  .icon-btn svg { width: 18px; height: 18px; }

  /* LOG */
  .log-group { margin-bottom: 16px; }
  .log-date-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 4px 10px; }
  .log-date { font-size: 13px; font-weight: 600; color: var(--text2); }
  .log-date-total {
    font-family: 'Roboto Mono', monospace; font-size: 11px; font-weight: 600;
    background: var(--yt-gradient); -webkit-background-clip: text;
    -webkit-text-fill-color: transparent; background-clip: text;
    padding: 3px 10px; border-radius: 12px;
    border: 1px solid rgba(255,0,51,0.3);
    white-space: nowrap;
  }

  /* STATS VIEW */
  .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .metric-card {
    background: var(--surface); border-radius: var(--radius);
    padding: 18px 16px; border: 1px solid var(--border); transition: var(--transition);
  }
  .metric-card:hover { background: var(--surface2); border-color: #555; }
  .metric-icon { font-size: 20px; margin-bottom: 10px; display: block; }
  .metric-label { font-size: 11px; color: var(--text3); font-weight: 500; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
  .metric-val { font-size: 24px; font-weight: 700; color: var(--text); font-family: 'Roboto Mono', monospace; }
  .chart-card {
    background: var(--surface); border-radius: var(--radius);
    padding: 20px; border: 1px solid var(--border); margin-bottom: 16px;
  }
  .chart-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 18px; }
  .subj-bar-row { margin-bottom: 14px; }
  .subj-bar-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
  .subj-bar-name { font-size: 13px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .subj-bar-name .dot { width: 8px; height: 8px; border-radius: 50%; }
  .subj-bar-val { font-size: 12px; font-weight: 600; color: var(--text3); font-family: 'Roboto Mono', monospace; }
  .bar-track { height: 4px; background: var(--bg2); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 4px; border-radius: 2px; transition: width 0.9s cubic-bezier(.23,1,.32,1); }
  .heatmap { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; }
  .heat-cell { text-align: center; }
  .heat-block { height: 38px; border-radius: 8px; background: var(--bg2); margin-bottom: 5px; border: 1px solid var(--border); transition: all 0.3s; }
  .heat-day { font-size: 10px; color: var(--text3); font-weight: 500; }

  /* EMPTY */
  .empty-state { text-align: center; padding: 48px 24px; color: var(--text3); font-size: 14px; line-height: 2; }
  .empty-state .empty-icon { font-size: 40px; display: block; margin-bottom: 8px; opacity: 0.4; }

  .scrollable { max-height: 460px; overflow-y: auto; }

  @media(max-width:480px) {
    .timer-display { font-size: 44px; }
    .stats-row { gap: 8px; }
    .stat-value { font-size: 17px; }
    .login-card { padding: 32px 20px; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="loader-ring"></div>
  <div class="loader-text">Loading your data...</div>
</div>

<div id="app">

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon">📚</div>
        <div class="login-logo-text">Study Tracker</div>
      </div>
      <div class="login-sub">Sign in to sync your sessions across all devices</div>
      <div class="field-wrap">
        <label class="field-label">Username</label>
        <input class="field-input" id="inp-user" type="text" placeholder="Enter your username" maxlength="20" autocomplete="off" spellcheck="false">
      </div>
      <div class="field-wrap">
        <label class="field-label">4-Digit PIN</label>
        <input class="field-input pin" id="inp-pin" type="password" placeholder="••••" maxlength="4" inputmode="numeric">
      </div>
      <button class="login-btn" id="login-btn" onclick="handleLogin()">Sign In</button>
      <div class="login-error" id="login-error"></div>
      <div class="login-note">🔒 Same username + PIN syncs across all devices</div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main-screen">
    <div class="app-bar">
      <div class="app-bar-brand">
        <div class="app-bar-logo">📚</div>
        <span class="app-bar-title">Study Tracker</span>
      </div>
      <div class="sync-chip">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-text">Synced</span>
      </div>
      <button class="user-chip" onclick="handleLogout()" title="Sign out">
        <div class="user-avatar" id="user-avatar">U</div>
        <span class="user-name" id="user-name">User</span>
      </button>
    </div>

    <div class="content">
      <div class="stats-row">
        <div class="stat-card"><div class="stat-label">Today</div><div class="stat-value" id="stat-today">00:00:00</div></div>
        <div class="stat-card"><div class="stat-label">This Week</div><div class="stat-value" id="stat-week">00:00:00</div></div>
        <div class="stat-card"><div class="stat-label">All Time</div><div class="stat-value" id="stat-all">00:00:00</div></div>
      </div>

      <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchView('timer',this)">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15 1H9v2h6V1zm-4 13h2V8h-2v6zm8.03-6.61l1.42-1.42c-.43-.51-.9-.99-1.41-1.41l-1.42 1.42C16.07 4.74 14.12 4 12 4c-4.97 0-9 4.03-9 9s4.02 9 9 9 9-4.03 9-9c0-2.12-.74-4.07-1.97-5.61zM12 20c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
          Timer
        </button>
        <button class="tab-btn" onclick="switchView('log',this)">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
          Log
        </button>
        <button class="tab-btn" onclick="switchView('stats',this)">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 9.2h3V19H5V9.2zM10.6 5h2.8v14h-2.8V5zm5.6 8H19v6h-2.8v-6z"/></svg>
          Stats
        </button>
      </div>

      <!-- TIMER VIEW -->
      <div class="view active" id="view-timer">
        <div id="subject-row">
          <div class="section-title">Select Subject</div>
          <div class="subject-chips" id="chips"></div>
        </div>
        <div class="timer-card">
          <div class="timer-display" id="timer-display">00:00:00</div>
          <div class="active-label" id="active-label">Ready to start</div>
          <button class="fab start" id="fab-btn" onclick="toggleTimer()">
            <svg id="fab-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          </button>
        </div>
        <div id="today-blocks"></div>
      </div>

      <!-- LOG VIEW -->
      <div class="view" id="view-log">
        <div class="scrollable" id="log-content"></div>
      </div>

      <!-- STATS VIEW -->
      <div class="view" id="view-stats">
        <div class="metrics-grid" id="metrics-grid"></div>
        <div class="chart-card"><div class="chart-title">Subject Breakdown</div><div id="subject-bars"></div></div>
        <div class="chart-card"><div class="chart-title">Last 7 Days</div><div class="heatmap" id="heatmap"></div></div>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://dyvykcjpibdoqiwixbkq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5dnlrY2pwaWJkb3Fpd2l4YmtxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTc1MDAsImV4cCI6MjA4ODM5MzUwMH0.vT73cU4udHRP0q7l5fsdPlrqxexjpqYKdageDt8M8r0';
const TABLE = 'sessions';

const SUBJECTS = [
  { id:'physics',     label:'Physics',       icon:'⚛',  color:'#3ea6ff' },
  { id:'chemistry',   label:'Chemistry',     icon:'🧪', color:'#ff70aa' },
  { id:'mathematics', label:'Mathematics',   icon:'📐', color:'#4caf82' },
  { id:'revision',    label:'Revision',      icon:'📝', color:'#ffb74d' },
  { id:'analysis',    label:'Test Analysis', icon:'📊', color:'#b47aee' },
  { id:'test',        label:'Test',          icon:'📋', color:'#ff4444' },
];

// SVG icons as strings
const ICONS = {
  play: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`,
  stop: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h12v12H6z"/></svg>`,
  delete: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 9v10H8V9h8m-1.5-6h-5l-1 1H5v2h14V4h-3.5l-1-1zM18 7H6v12c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7z"/></svg>`,
};

function getSubject(id) { return SUBJECTS.find(s=>s.id===id)||SUBJECTS[0]; }

let userKey=null, username='';
let sessions=[], activeSession=null, elapsed=0;
let timerInterval=null, selectedSubject=SUBJECTS[0];

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function fmtDur(s) {
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}
function fmtShort(s) {
  if(!s) return '0m';
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);
  if(h>0&&m>0) return `${h}h ${m}m`;
  if(h>0) return `${h}h`;
  return `${m}m`;
}
function todayKey() { return new Date().toISOString().slice(0,10); }
function fmtTime(ts) { return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function fmtDate(d) {
  if(d===todayKey()) return 'Today';
  return new Date(d).toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
}

async function sbFetch(method, path, body) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': method==='POST'?'return=minimal':'',
    },
    body: body?JSON.stringify(body):undefined
  });
  if(!res.ok) throw new Error(await res.text());
  if(method==='GET') return res.json();
  return null;
}

async function loadSessions() {
  setSyncStatus('syncing');
  try {
    const data = await sbFetch('GET',`${TABLE}?user_key=eq.${encodeURIComponent(userKey)}&order=start_time.desc`);
    sessions = data||[];
    setSyncStatus('synced');
  } catch(e) { setSyncStatus('error'); console.error('Load error:',e); }
}

async function saveSession(s) {
  setSyncStatus('syncing');
  try {
    await sbFetch('POST', TABLE, {
      id:s.id, user_key:userKey, subject:s.subject,
      start_time:s.startTime, end_time:s.endTime,
      duration:s.duration, date:s.date
    });
    setSyncStatus('synced');
  } catch(e) { setSyncStatus('error'); console.error('Save error:',e); }
}

async function deleteSessionDB(id) {
  setSyncStatus('syncing');
  try {
    await sbFetch('DELETE',`${TABLE}?id=eq.${id}&user_key=eq.${encodeURIComponent(userKey)}`,null);
    setSyncStatus('synced');
  } catch(e) { setSyncStatus('error'); }
}

function setSyncStatus(s) {
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-text');
  dot.className='sync-dot'+(s!=='synced'?' '+s:'');
  txt.textContent=s==='synced'?'Synced':s==='syncing'?'Syncing...':'Sync Error';
}

async function handleLogin() {
  const u=document.getElementById('inp-user').value.trim().toLowerCase();
  const p=document.getElementById('inp-pin').value.trim();
  const err=document.getElementById('login-error');
  const btn=document.getElementById('login-btn');
  if(!u){err.textContent='Please enter a username';return;}
  if(!/^\d{4}$/.test(p)){err.textContent='PIN must be exactly 4 digits';return;}
  btn.disabled=true; btn.textContent='Signing in...'; err.textContent='';
  try {
    userKey=await sha256(u+':'+p);
    username=u;
    localStorage.setItem('fl_user',u);
    localStorage.setItem('fl_pin',p);
    await loadSessions();
    showMain();
  } catch(e) {
    err.textContent='Connection error — check your internet and try again';
    btn.disabled=false; btn.textContent='Sign In';
    console.error('Login error:',e);
  }
}

function handleLogout() {
  if(!confirm('Sign out?')) return;
  localStorage.removeItem('fl_user'); localStorage.removeItem('fl_pin');
  userKey=null; sessions=[]; activeSession=null;
  clearInterval(timerInterval);
  document.getElementById('main-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
}

function showMain() {
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-screen').style.display='block';
  document.getElementById('user-avatar').textContent=username.slice(0,2).toUpperCase();
  document.getElementById('user-name').textContent=username;
  renderChips(); renderAll();
}

function toggleTimer() { activeSession?stopTimer():startTimer(); }

function startTimer() {
  activeSession={id:Date.now(),subject:selectedSubject.id,startTime:Date.now(),date:todayKey()};
  elapsed=0;
  const btn=document.getElementById('fab-btn');
  btn.className='fab stop';
  btn.innerHTML=ICONS.stop;
  document.getElementById('timer-display').classList.add('running');
  document.getElementById('active-label').innerHTML=`Studying <span>${selectedSubject.icon} ${selectedSubject.label}</span>`;
  document.getElementById('subject-row').style.display='none';
  timerInterval=setInterval(()=>{
    elapsed=Math.floor((Date.now()-activeSession.startTime)/1000);
    document.getElementById('timer-display').textContent=fmtDur(elapsed);
  },1000);
}

async function stopTimer() {
  clearInterval(timerInterval);
  if(!activeSession) return;
  const dur=Math.floor((Date.now()-activeSession.startTime)/1000);
  if(dur<5){activeSession=null;elapsed=0;resetTimerUI();return;}
  const s={...activeSession,endTime:Date.now(),duration:dur};
  sessions.unshift(s); activeSession=null; elapsed=0;
  resetTimerUI(); renderAll();
  await saveSession(s);
}

function resetTimerUI() {
  const btn=document.getElementById('fab-btn');
  btn.className='fab start';
  btn.innerHTML=ICONS.play;
  document.getElementById('timer-display').classList.remove('running');
  document.getElementById('timer-display').textContent='00:00:00';
  document.getElementById('active-label').textContent='Ready to start';
  document.getElementById('subject-row').style.display='block';
}

function renderChips() {
  document.getElementById('chips').innerHTML=SUBJECTS.map(s=>
    `<button class="subj-chip ${s.id===selectedSubject.id?'selected':''}"
      style="${s.id===selectedSubject.id?`background:${s.color};border-color:${s.color}`:'color:var(--text3)'}"
      onclick="selectSubject('${s.id}')">
      <div class="dot" style="background:${s.color}"></div>${s.icon} ${s.label}
    </button>`
  ).join('');
}

function selectSubject(id) { selectedSubject=getSubject(id); renderChips(); }
function renderAll() { renderTopStats(); renderTodayBlocks(); renderLog(); renderStatsView(); }

function getTodaySessions() { return sessions.filter(s=>s.date===todayKey()); }
function getWeekSessions() {
  const now=Date.now();
  return sessions.filter(s=>(now-new Date(s.date).getTime())<7*24*3600*1000);
}
function totalDur(arr) { return arr.reduce((a,s)=>a+(s.duration||0),0); }

function renderTopStats() {
  document.getElementById('stat-today').textContent=fmtDur(totalDur(getTodaySessions()));
  document.getElementById('stat-week').textContent=fmtDur(totalDur(getWeekSessions()));
  document.getElementById('stat-all').textContent=fmtDur(totalDur(sessions));
}

function renderTodayBlocks() {
  const ts=getTodaySessions();
  const el=document.getElementById('today-blocks');
  if(!ts.length){el.innerHTML='';return;}
  el.innerHTML=`<div class="blocks-card">
    <div class="blocks-header">
      <div class="blocks-title">Today's Sessions</div>
      <div class="blocks-total">${fmtDur(totalDur(ts))}</div>
    </div>
    ${ts.map(s=>{
      const sub=getSubject(s.subject);
      return `<div class="block-item">
        <div class="block-color" style="background:${sub.color}"></div>
        <div class="block-info">
          <div class="block-subj">${sub.icon} ${sub.label}</div>
          <div class="block-time">${fmtTime(s.startTime)} – ${fmtTime(s.endTime)}</div>
        </div>
        <div class="block-dur">${fmtShort(s.duration)}</div>
        <button class="icon-btn" onclick="deleteSession(${s.id})">${ICONS.delete}</button>
      </div>`;
    }).join('')}
  </div>`;
}

function renderLog() {
  const el=document.getElementById('log-content');
  if(!sessions.length){
    el.innerHTML=`<div class="empty-state"><span class="empty-icon">📋</span>No sessions logged yet.<br>Start the timer to begin tracking!</div>`;
    return;
  }
  const byDate={};
  sessions.forEach(s=>{if(!byDate[s.date])byDate[s.date]=[];byDate[s.date].push(s);});
  const dates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
  el.innerHTML=dates.map(date=>{
    const ds=byDate[date];
    return `<div class="log-group">
      <div class="log-date-header">
        <div class="log-date">${fmtDate(date)}</div>
        <div class="log-date-total">Total: ${fmtDur(totalDur(ds))}</div>
      </div>
      <div class="blocks-card">
        ${ds.map(s=>{
          const sub=getSubject(s.subject);
          return `<div class="block-item">
            <div class="block-color" style="background:${sub.color}"></div>
            <div class="block-info">
              <div class="block-subj">${sub.icon} ${sub.label}</div>
              <div class="block-time">${fmtTime(s.startTime)} – ${fmtTime(s.endTime)}</div>
            </div>
            <div class="block-dur">${fmtDur(s.duration)}</div>
            <button class="icon-btn" onclick="deleteSession(${s.id})">${ICONS.delete}</button>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderStatsView() {
  const all=totalDur(sessions);
  const avgSess=sessions.length?Math.round(all/sessions.length):0;
  const byDate={};
  sessions.forEach(s=>{byDate[s.date]=(byDate[s.date]||0)+s.duration;});
  const bestDay=Object.values(byDate).length?Math.max(...Object.values(byDate)):0;
  const days=new Set(sessions.map(s=>s.date)).size;

  const metricIcons = ['📅','⏱','🏆','📆'];
  document.getElementById('metrics-grid').innerHTML=[
    {label:'Total Sessions', val:sessions.length},
    {label:'Avg Session',    val:avgSess?fmtShort(avgSess):'—'},
    {label:'Best Day',       val:bestDay?fmtShort(bestDay):'—'},
    {label:'Days Logged',    val:days},
  ].map((m,i)=>`<div class="metric-card">
    <span class="metric-icon">${metricIcons[i]}</span>
    <div class="metric-label">${m.label}</div>
    <div class="metric-val">${m.val}</div>
  </div>`).join('');

  const subjTotals={};
  sessions.forEach(s=>{subjTotals[s.subject]=(subjTotals[s.subject]||0)+s.duration;});
  const top=Object.entries(subjTotals).sort((a,b)=>b[1]-a[1]);
  document.getElementById('subject-bars').innerHTML=!top.length
    ?`<div class="empty-state" style="padding:20px 0">No data yet</div>`
    :top.map(([id,dur])=>{
      const sub=getSubject(id);
      const pct=all?Math.round(dur/all*100):0;
      return `<div class="subj-bar-row">
        <div class="subj-bar-top">
          <div class="subj-bar-name">
            <div class="dot" style="background:${sub.color}"></div>${sub.icon} ${sub.label}
          </div>
          <div class="subj-bar-val">${fmtShort(dur)} · ${pct}%</div>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%;background:${sub.color}"></div>
        </div>
      </div>`;
    }).join('');

  document.getElementById('heatmap').innerHTML=Array.from({length:7},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-(6-i));
    const key=d.toISOString().slice(0,10);
    const dur=byDate[key]||0;
    const intensity=Math.min(dur/7200,1);
    const alpha=0.08+intensity*0.85;
    return `<div class="heat-cell">
      <div class="heat-block" style="background:rgba(255,${Math.round(intensity*30)},${Math.round(intensity*60)},${alpha});border-color:rgba(255,0,51,${0.1+intensity*0.5})" title="${fmtDate(key)}: ${fmtShort(dur)}"></div>
      <div class="heat-day">${d.toLocaleDateString([],{weekday:'narrow'})}</div>
    </div>`;
  }).join('');
}

async function deleteSession(id) {
  if(!confirm('Delete this session?')) return;
  sessions=sessions.filter(s=>s.id!==id);
  renderAll();
  await deleteSessionDB(id);
}

function switchView(name,btn) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  btn.classList.add('active');
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('login-screen').style.display!=='none') handleLogin();
});

async function tryAutoLogin() {
  const u=localStorage.getItem('fl_user');
  const p=localStorage.getItem('fl_pin');
  if(u&&p&&/^\d{4}$/.test(p)) {
    userKey=await sha256(u+':'+p); username=u;
    try { await loadSessions(); showMain(); }
    catch(e) {
      document.getElementById('loading').style.display='none';
      document.getElementById('login-screen').style.display='flex';
    }
  } else {
    document.getElementById('loading').style.display='none';
    document.getElementById('login-screen').style.display='flex';
  }
}

window.addEventListener('load',async()=>{
  await tryAutoLogin();
  document.getElementById('loading').style.display='none';
});
</script>
